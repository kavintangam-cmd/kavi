<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MANI'S Board & Stickers</title>

<!-- GOOGLE FONTS -->

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#eef4ff,#dbe9ff);
    color:#111;
    text-align:center;
}

/* HEADER */

.header{
    padding:50px 20px 30px;
}

/* MANI'S LOGO */

.logo-title{
    font-family:'Orbitron',sans-serif;
    font-size:75px;
    font-weight:700;
    color:#2b0b52;
    letter-spacing:5px;
    text-transform:uppercase;
    position:relative;
    display:inline-block;
}

.logo-title::after{
    content:'';
    display:block;
    width:100%;
    height:5px;
    background:#ff4d2d;
    margin-top:8px;
}

.logo-sub{
    font-size:30px;
    color:#ff4d2d;
    margin-top:12px;
    letter-spacing:3px;
    font-weight:600;
}

/* TAGLINE */

.shop-tag{
    font-size:20px;
    color:#555;
    margin-top:20px;
}

/* BUTTON AREA */

.menu{
    padding:30px;
}

button{
    padding:15px 28px;
    margin:10px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#2b0b52,#5f27cd);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(43,11,82,0.3);
}

button:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(43,11,82,0.4);
}

/* DISPLAY SECTION */

#display-section{
    display:none;
    width:90%;
    margin:30px auto;
    padding:40px;
    border-radius:25px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* TITLE */

#display-title{
    font-size:42px;
    color:#2b0b52;
    margin-bottom:30px;
    font-weight:700;
}

/* IMAGE GALLERY */

#image-gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
}

#image-gallery img{
    width:320px;
    height:230px;
    object-fit:cover;
    border-radius:20px;
    border:5px solid #2b0b52;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

#image-gallery img:hover{
    transform:scale(1.05);
}

/* CONTACT BOX */

.contact-box{
    background:linear-gradient(135deg,#2b0b52,#5f27cd);
    color:white;
    padding:35px;
    border-radius:25px;
    max-width:650px;
    margin:auto;
    font-size:20px;
    line-height:2;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.contact-box strong{
    color:#ffe600;
}

/* FOOTER */

.footer{
    margin-top:50px;
    padding:20px;
    background:#2b0b52;
    color:white;
    font-size:16px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="logo-title">MANI'S</div>

    <div class="logo-sub">Board & Stickers</div>

    <div class="shop-tag">
        Digital Sign Boards • LED Boards • Premium Stickers
    </div>

</div>

<!-- BUTTONS -->

<div class="menu">

    <button onclick="showDesigns('Order Now')">Order Now</button>

    <button onclick="showDesigns('Design Gallery')">View Designs</button>

    <button onclick="showDesigns('LED Boards')">LED Boards</button>

    <button onclick="showDesigns('Custom Stickers')">Custom Stickers</button>

    <button onclick="showDesigns('Sign Boards')">Sign Boards</button>

    <button onclick="showContact()">Contact Us</button>

</div>

<!-- DISPLAY SECTION -->

<div id="display-section">

    <h2 id="display-title"></h2>

    <div id="image-gallery"></div>

</div>

<!-- FOOTER -->

<div class="footer">
    © 2025 MANI'S Board & Stickers | All Rights Reserved
</div>

<script>

/* DESIGN DISPLAY */

function showDesigns(type){

    let title = document.getElementById("display-title");

    let gallery = document.getElementById("image-gallery");

    let section = document.getElementById("display-section");

    title.innerHTML = type;

    gallery.innerHTML = `
    
    <img src="https://picsum.photos/400/300?1">

    <img src="https://picsum.photos/400/300?2">

    <img src="https://picsum.photos/400/300?3">

    <img src="https://picsum.photos/400/300?4">

    `;

    section.style.display = "block";
}

/* CONTACT SECTION */

function showContact(){

    let title = document.getElementById("display-title");

    let gallery = document.getElementById("image-gallery");

    let section = document.getElementById("display-section");

    title.innerHTML = "Contact Us";

    gallery.innerHTML = `
    
    <div class="contact-box">

        <p><strong>Shop Name:</strong> MANI'S Board & Stickers</p>

        <p><strong>Phone:</strong> +91 93600 23103</p>

        <p><strong>Phone:</strong> +91 90920 44103</p>

        <p><strong>Email:</strong> manisboards@gmail.com</p>

        <p><strong>Location:</strong> Madurai, Tamil Nadu</p>

        <p><strong>Services:</strong> LED Boards, Flex Printing, Stickers</p>

    </div>

    `;

    section.style.display = "block";
}

</script>

</body>
</html>
